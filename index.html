<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Errata</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f3ea;
      --paper: #fffdf8;
      --ink: #1d1a17;
      --muted: #6a6259;
      --rule: #d7cdbf;
      --accent: #8b2f1c;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      background:
        radial-gradient(circle at top right, rgba(139, 47, 28, 0.08), transparent 24rem),
        linear-gradient(180deg, #f8f4ec 0%, var(--bg) 100%);
      color: var(--ink);
    }

    main {
      max-width: 46rem;
      margin: 4rem auto;
      padding: 0 1.5rem;
    }

    .card {
      background: var(--paper);
      border: 1px solid var(--rule);
      box-shadow: 0 1.2rem 3rem rgba(20, 16, 12, 0.08);
      padding: 2rem;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 4vw, 3rem);
      line-height: 1.05;
      font-weight: 700;
    }

    .sig {
      margin: 0 0 0.85rem;
      font-size: 0.78rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .lead {
      margin: 0.85rem 0 0;
      line-height: 1.65;
      color: var(--muted);
      font-size: 1.05rem;
    }

    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 0.85rem;
      margin-top: 1.5rem;
    }

    a {
      color: var(--accent);
    }

    .links a {
      display: inline-block;
      padding: 0.7rem 1rem;
      border: 1px solid var(--rule);
      background: rgba(255, 255, 255, 0.7);
      text-decoration: none;
      box-shadow: 0 0.4rem 1rem rgba(20, 16, 12, 0.04);
    }

    a:hover {
      text-decoration-thickness: 2px;
    }

    .links a:hover {
      background: #fff;
    }
  </style>
</head>
<body>
  <main>
    <section class="card">
      <p class="sig">RA</p>
      <h1>Errata</h1>
      <p class="lead">
        Errata for <em>Tikhonov and Landweber convergence rates:
        characterization by interpolation spaces</em> (2015).
      </p>
      <div class="links">
        <a href="https://arxiv.org/abs/1503.05742v4">Original paper</a>
        <a href="characterization/tex/errata_list.pdf">Errata PDF</a>
      </div>
    </section>
  </main>
</body>
</html>
